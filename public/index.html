                "@type": "Answer",

                "@type": "Answer",
                "text": "Non-deductible expenses for CIT in Nigeria include: entertainment expenses, fines and penalties, personal expenses of directors/shareholders, political donations, provisions for future/contingent liabilities, capital expenditure (claimed via capital allowances instead), excessive interest on related-party loans (thin capitalisation rules apply), and any expense not wholly, reasonably, and exclusively incurred for business purposes."

                "@type": "Answer",
                "text": "Yes. Key CGT exemptions under NTA 2025 include: disposal of a primary residence (for individuals), sale of personal motor vehicles, small investor relief for individuals (disposal proceeds under N150 million and gains of N10 million or less), and small company exemption (annual turnover under N50 million and total fixed assets under N250 million). Capital losses can also be offset against capital gains."

              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Deferred tax arises from temporary differences between the carrying amount of assets/liabilities in financial statements and their tax base, as required by IAS 12. Common sources include accelerated capital allowances on property, plant and equipment (PPE), provisions not yet deductible for tax, and tax loss carryforwards. The deferred tax is calculated by multiplying the temporary difference by the applicable tax rate."
